<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HARK token setter</title>
<style>
body{background:#03050a;color:#e2e8f0;font-family:-apple-system,system-ui,sans-serif;padding:24px;font-size:14px}
.ok{color:#48bb78}.bad{color:#fc8181}.muted{color:#718096}
pre{background:#0a0e16;padding:12px;border-radius:8px;overflow-x:auto;font-size:11px;color:#cbd5e0}
button{background:#4f9eff;color:white;border:none;padding:10px 18px;border-radius:6px;font-size:14px;cursor:pointer;margin-top:16px}
</style>
</head>
<body>
<h1>HARK · token setter</h1>
<div id="status">Working…</div>
<pre id="log"></pre>
<button id="go" style="display:none" onclick="location.href='/HARK-System-Map/'">Open HARK map →</button>
<script>
const log = (m, cls) => {
  const el = document.getElementById('log');
  el.innerHTML += (cls ? '<span class="'+cls+'">'+m+'</span>' : m) + '\n';
};
const setStatus = (m, cls) => {
  document.getElementById('status').innerHTML = '<span class="'+cls+'">'+m+'</span>';
};

(async () => {
  const params = new URLSearchParams(location.search);
  const token = params.get('t');
  log('origin: ' + location.origin);
  if (!token) {
    setStatus('NO TOKEN IN URL — append ?t=YOUR_TOKEN', 'bad');
    return;
  }
  log('token received: ' + token.substring(0,15) + '...' + token.substring(token.length-6));

  // Set localStorage
  localStorage.setItem('hark-gh-token', token);
  const readback = localStorage.getItem('hark-gh-token');
  if (readback === token) {
    log('localStorage write ✓ verified', 'ok');
  } else {
    log('localStorage write FAILED', 'bad');
    setStatus('FAIL — localStorage did not persist', 'bad');
    return;
  }

  // Verify token works against GitHub API
  log('testing token against GitHub API...');
  try {
    const r = await fetch('https://api.github.com/repos/TheMaxLong/HARK-System-Map', {
      headers: {'Authorization': 'token ' + token}
    });
    log('GitHub API: HTTP ' + r.status, r.ok ? 'ok' : 'bad');
    if (!r.ok) {
      setStatus('Token rejected by GitHub (' + r.status + ')', 'bad');
      return;
    }
  } catch(e) {
    log('GitHub API error: ' + e.message, 'bad');
  }

  // Verify write access — GET map-state.json
  try {
    const r = await fetch('https://api.github.com/repos/TheMaxLong/HARK-System-Map/contents/map-state.json', {
      headers: {'Authorization': 'token ' + token}
    });
    const d = await r.json();
    log('map-state.json SHA: ' + (d.sha ? d.sha.substring(0,12) : 'missing'), d.sha ? 'ok' : 'bad');
  } catch(e) {
    log('SHA fetch error: ' + e.message, 'bad');
  }

  // PROOF the page ran: write a tiny ack file to the repo via GitHub API.
  // Mac polls /tokens-ack.txt — when its content updates, Pixel 10 confirmed.
  try {
    const ackPath = 'tokens-ack.txt';
    const ackBody = 'Pixel 10 set token at ' + new Date().toISOString() + ' :: ' + token.substring(0,12) + '...' + token.substring(token.length-6);
    const contentB64 = btoa(ackBody);
    // Get existing SHA if any
    let sha = null;
    const head = await fetch('https://api.github.com/repos/TheMaxLong/HARK-System-Map/contents/' + ackPath, {
      headers: {'Authorization': 'token ' + token}
    });
    if (head.ok) sha = (await head.json()).sha;
    const put = await fetch('https://api.github.com/repos/TheMaxLong/HARK-System-Map/contents/' + ackPath, {
      method: 'PUT',
      headers: {'Authorization': 'token ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: 'device ack: token installed',
        content: contentB64,
        ...(sha ? {sha} : {})
      })
    });
    log('ack commit: HTTP ' + put.status, put.ok ? 'ok' : 'bad');
  } catch(e) {
    log('ack commit failed: ' + e.message, 'bad');
  }

  setStatus('✓ TOKEN INSTALLED — ready to sync', 'ok');
  document.getElementById('go').style.display = 'inline-block';

  // Auto-redirect after 4s
  setTimeout(() => location.replace('/HARK-System-Map/'), 4000);
})();
</script>
</body>
</html>
